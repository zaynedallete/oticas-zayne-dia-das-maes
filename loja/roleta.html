<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girar Roleta — Óticas Zayne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #C9A84C; --gold-light: #E5C46A;
      --dark: #111111; --dark2: #1C1C1C; --white: #FFFFFF;
    }
    body {
      background-color: var(--dark);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(201,168,76,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 50vh;
      background: radial-gradient(ellipse at 50% -10%, rgba(201,168,76,0.13) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    header, .chosen, .wheel-section, .motivador, .prize-hint, .btn-girar, footer { position: relative; z-index: 1; }

    header {
      width: 100%; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(201,168,76,0.18);
      backdrop-filter: blur(8px); background: rgba(17,17,17,0.6);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { height: 38px; object-fit: contain; }
    .modo-loja {
      font-size: 0.7rem; color: rgba(201,168,76,0.6);
      border: 1px solid rgba(201,168,76,0.25); border-radius: 20px;
      padding: 4px 12px; letter-spacing: 1px; text-transform: uppercase;
    }

    .chosen {
      text-align: center; padding: 32px 24px 10px;
      max-width: 520px; width: 100%;
      animation: fadeDown 0.6s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chosen-label {
      font-size: 0.72rem; color: rgba(255,255,255,0.38);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
    }
    .chosen-quote {
      position: relative; padding: 0 28px;
    }
    .chosen-quote::before, .chosen-quote::after {
      content: '"'; position: absolute;
      font-size: 3.5rem; color: var(--gold); opacity: 0.22;
      font-family: Georgia, serif; line-height: 1;
    }
    .chosen-quote::before { top: -12px; left: 0; }
    .chosen-quote::after  { content: '"'; bottom: -28px; right: 0; }
    .chosen-text {
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-style: italic; color: var(--gold-light);
      font-weight: 600; line-height: 1.5;
    }
    .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 26px auto 4px;
    }

    .wheel-section {
      display: flex; flex-direction: column; align-items: center;
      padding: 18px 20px 4px;
      animation: fadeUp 0.7s 0.15s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .wheel-outer {
      padding: 10px; border-radius: 50%; position: relative;
    }
    .wheel-outer::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: conic-gradient(
        rgba(201,168,76,0.5), rgba(201,168,76,0.1),
        rgba(201,168,76,0.5), rgba(201,168,76,0.1),
        rgba(201,168,76,0.5)
      );
      animation: spin-ring 8s linear infinite;
    }
    .wheel-outer::after {
      content: ''; position: absolute; inset: 2px;
      border-radius: 50%; background: var(--dark);
    }
    @keyframes spin-ring { to { transform: rotate(360deg); } }

    .wheel-wrap {
      position: relative;
      width: min(300px, 80vw); height: min(300px, 80vw);
      z-index: 1;
    }
    .pointer {
      position: absolute; top: 50%; right: -18px;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 13px solid transparent;
      border-bottom: 13px solid transparent;
      border-right: 28px solid var(--gold);
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.8));
      z-index: 10;
      animation: pointer-pulse 1.5s ease-in-out infinite;
    }
    @keyframes pointer-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(201,168,76,0.6)); }
      50%       { filter: drop-shadow(0 0 14px rgba(201,168,76,1)); }
    }
    #wheelCanvas {
      width: 100%; height: 100%; border-radius: 50%;
      box-shadow: 0 0 0 3px var(--gold), 0 0 0 6px rgba(201,168,76,0.15), 0 0 60px rgba(201,168,76,0.2);
    }

    .motivador {
      text-align: center; padding: 18px 20px 4px;
      font-size: clamp(0.85rem, 2.5vw, 0.95rem);
      color: rgba(255,255,255,0.55);
      animation: fadeUp 0.7s 0.3s ease both;
    }
    .motivador strong { color: var(--gold); }

    .prize-hint {
      display: flex; justify-content: center; gap: 8px;
      flex-wrap: wrap; padding: 10px 20px 0;
      animation: fadeUp 0.7s 0.4s ease both;
    }
    .prize-hint span {
      font-size: 0.68rem; color: rgba(201,168,76,0.6);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px; padding: 2px 10px;
    }

    .btn-girar {
      margin: 18px 20px 36px;
      background: linear-gradient(135deg, #B8960C, var(--gold), var(--gold-light), var(--gold));
      background-size: 200% auto;
      color: var(--dark);
      font-family: 'Poppins', sans-serif;
      font-size: clamp(1rem, 3vw, 1.18rem);
      font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 18px 56px; border: none; border-radius: 50px; cursor: pointer;
      transition: background-position 0.4s ease, transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 6px 28px rgba(201,168,76,0.45);
      animation: pulse-btn 2.4s ease-in-out infinite, fadeUp 0.7s 0.5s ease both;
      position: relative; overflow: hidden;
    }
    .btn-girar::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.5s ease;
    }
    .btn-girar:hover::after { transform: translateX(100%); }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 6px 28px rgba(201,168,76,0.45); }
      50%       { box-shadow: 0 8px 48px rgba(201,168,76,0.7), 0 0 0 8px rgba(201,168,76,0.1); }
    }
    .btn-girar:hover:not(:disabled) {
      background-position: right center; transform: scale(1.05) translateY(-2px);
      animation: none; box-shadow: 0 12px 40px rgba(201,168,76,0.65);
    }
    .btn-girar:active:not(:disabled) { transform: scale(0.97); }
    .btn-girar:disabled { opacity: 0.45; cursor: not-allowed; animation: none; }

    footer {
      margin-top: auto; padding: 12px;
      color: rgba(255,255,255,0.18); font-size: 0.7rem;
      text-align: center; border-top: 1px solid rgba(201,168,76,0.08); width: 100%;
    }
  </style>
</head>
<body>

<header>
  <img src="../PNG - SITE.png" alt="Óticas Zayne" class="logo">
  <span class="modo-loja">🏪 Modo Loja</span>
</header>

<div class="chosen">
  <div class="chosen-label">Frase escolhida</div>
  <div class="chosen-quote">
    <div class="chosen-text" id="fraseExibida">…</div>
  </div>
</div>

<div class="divider"></div>

<div class="wheel-section">
  <div class="wheel-outer">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>
  </div>
</div>

<p class="motivador">🎁 <strong>Todo mundo ganha!</strong> Gire e descubra seu prêmio!</p>
<div class="prize-hint" id="prizeHint"></div>

<button class="btn-girar" id="btnGirar">🎰 GIRAR A ROLETA</button>

<footer>
  Óticas Zayne · Modo Loja · Dia das Mães 2026<br>
  <span style="opacity:.55">*Descontos válidos para pagamentos à vista ou no cartão. Não cumulativo.</span>
</footer>

<script>
  const frase = sessionStorage.getItem('loja_frase');
  if (!frase) { window.location.href = '/loja/index.html'; }
  if (sessionStorage.getItem('loja_jaGirou')) { window.location.href = '/loja/premio.html'; }

  document.getElementById('fraseExibida').textContent = frase;

  const PREMIOS = [
    { l1: 'R$ 160', l2: 'desconto', full: 'R$ 160 de desconto', peso:  3 },
    { l1: 'R$ 180', l2: 'desconto', full: 'R$ 180 de desconto', peso:  7 },
    { l1: 'R$ 220', l2: 'desconto', full: 'R$ 220 de desconto', peso: 15 },
    { l1: 'R$ 250', l2: 'desconto', full: 'R$ 250 de desconto', peso: 20 },
    { l1: 'R$ 280', l2: 'desconto', full: 'R$ 280 de desconto', peso: 25 },
    { l1: 'R$ 300', l2: 'desconto', full: 'R$ 300 de desconto', peso: 30 },
  ];

  const hint = document.getElementById('prizeHint');
  PREMIOS.forEach(p => {
    const s = document.createElement('span');
    s.textContent = p.l1;
    hint.appendChild(s);
  });

  const SEG_COLORS = [
    ['#C9A84C','#111111'],['#1E1E1E','#E5C46A'],
    ['#A8893E','#111111'],['#161616','#C9A84C'],
    ['#D4AE52','#111111'],['#242424','#E5C46A'],
  ];

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const CX = canvas.width / 2, CY = canvas.height / 2;
  const R = CX - 6, N = PREMIOS.length, SEG = (2 * Math.PI) / N;

  function drawWheel(rotation) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    PREMIOS.forEach((p, i) => {
      const start = rotation + i * SEG - Math.PI / 2;
      const end = start + SEG;
      ctx.beginPath(); ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, start, end); ctx.closePath();
      ctx.fillStyle = SEG_COLORS[i][0]; ctx.fill();
      ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.save(); ctx.translate(CX, CY); ctx.rotate(start + SEG / 2);
      ctx.textAlign = 'right'; ctx.fillStyle = SEG_COLORS[i][1];
      ctx.font = 'bold 19px Poppins, sans-serif'; ctx.fillText(p.l1, R - 12, -5);
      ctx.font = '12px Poppins, sans-serif'; ctx.fillText(p.l2, R - 12, 12);
      ctx.restore();
    });
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, 2 * Math.PI);
    ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 4; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX, CY, R - 6, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(201,168,76,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 28);
    grad.addColorStop(0, '#E5C46A'); grad.addColorStop(1, '#A8893E');
    ctx.beginPath(); ctx.arc(CX, CY, 28, 0, 2 * Math.PI);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = 3; ctx.stroke();
    ctx.fillStyle = '#1A1A1A'; ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★', CX, CY); ctx.textBaseline = 'alphabetic';
  }

  document.fonts.ready.then(() => drawWheel(0));

  function sortear() {
    const total = PREMIOS.reduce((s, p) => s + p.peso, 0);
    let r = Math.random() * total;
    for (let i = 0; i < PREMIOS.length; i++) { r -= PREMIOS[i].peso; if (r <= 0) return i; }
    return PREMIOS.length - 1;
  }
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  let currentAngle = 0, isSpinning = false;
  document.getElementById('btnGirar').addEventListener('click', () => {
    if (isSpinning) return;
    isSpinning = true;
    document.getElementById('btnGirar').disabled = true;
    const winner = sortear();
    let target = Math.PI / 2 - (winner + 0.5) * SEG;
    target = ((target % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const currentNorm = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    let diff = target - currentNorm;
    if (diff <= 0) diff += 2 * Math.PI;
    const jitter = (Math.random() - 0.5) * SEG * 0.5;
    const endAngle = currentAngle + 5 * 2 * Math.PI + diff + jitter;
    const duration = 4800, startTime = performance.now(), startAngle = currentAngle;
    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      currentAngle = startAngle + (endAngle - startAngle) * easeOut(t);
      drawWheel(currentAngle);
      if (t < 1) { requestAnimationFrame(animate); }
      else {
        currentAngle = endAngle; drawWheel(currentAngle);
        sessionStorage.setItem('loja_premio', PREMIOS[winner].full);
        sessionStorage.setItem('loja_jaGirou', '1');
        setTimeout(() => { window.location.href = '/loja/premio.html'; }, 1400);
      }
    }
    requestAnimationFrame(animate);
  });
</script>

</body>
</html>
